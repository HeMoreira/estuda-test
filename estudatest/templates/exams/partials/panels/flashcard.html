<div class="fieldset-panel" id="panel-flashcard">
    <p class="fieldset-panel__hint">O aluno decide se acertou ou errou.</p>
    <div class="form__group">
        <label class="form__label">Frente do card (pergunta)</label>
        <textarea name="data_front" class="form__textarea" rows="2" placeholder="Pergunta ou conceito..."></textarea>
    </div>
    <div class="form__group margin-bottom-0">
        <label class="form__label">Verso do card (resposta)</label>
        <textarea name="data_back" class="form__textarea" rows="2" placeholder="Resposta ou definição..."></textarea>
    </div>
</div>
